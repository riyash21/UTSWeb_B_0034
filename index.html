<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>

    body {
      background-color: #0d1117;
      color: #c9d1d9;
      transition: background-color 0.3s, color 0.3s;
    }
    .bg-dark-custom {
      background-color: #161b22;
      transition: background-color 0.3s;
    }
    .img-cover {
      object-fit: cover;
      object-position: top;
      height: 200%;
    }
    .from-control-custom {
      background-color: #161b22;
      color: #c9d1d9;
      transition: background-color 0.3s ease;
    }
    .from-control-custom:focus {
      background-color: #ffffff;
      color: #0d1117;
      border-color: #3a7ce0;
      box-shadow: 0 0 0 0.2rem rgba(201, 209, 217, 0.25);
    }
    body-light-mode {
      background-color: #f8f9fa;
      color: #212529;
    }
    body.light-mode .bg-dark-custom,
    body.light-mode section,
    body.light-mode .bg-dark,
    body.light-mode .card {
      background-color: #f6f8fa;
      color: #1f2328;
      border-color: #d0d7de;
    }
    body.light-mode p,
    body.light-mode h1,
    body.light-mode h2,
    body.light-mode h3,
    body.light-mode h4,
    body.light-mode h5,
    body.light-mode li,
    body.light-mode .text-white,
    body.light-mode .text-secondary,
    body.light-mode .card-title,
    body.light-mode .card-text {
      color: #1f2328;
    }
    body.light-mode .btn-outline-secondary {
      color: #1f2328;
      border-color: #d0d7de;
    }
    body.light-mode .btn-outline-secondary:hover {
      background-color: #eaeef2;
    }
  </style>
</head>
<body>
  
</body>
</html>
